name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet "ruff>=0.9,<1"
      - name: Run Ruff
        run: |
          set +e
          ruff check . --output-format=concise > ruff-report.txt 2>&1
          echo "$?" > ruff-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-report
          path: |
            ruff-report.txt
            ruff-status.txt
      - name: Enforce Ruff result
        run: test "$(cat ruff-status.txt)" = "0"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall -q src

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hcm-discord-invite-tracker:test .
