name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet "ruff>=0.9,<1"
      - name: Generate Ruff correction
        run: |
          ruff check . --fix
          ruff check .
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-fixed-dashboard
          path: src/hcm_invite_tracker/dashboard.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall -q src

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hcm-discord-invite-tracker:test .
