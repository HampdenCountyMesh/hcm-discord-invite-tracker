services:
  invite-tracker:
    build: .
    container_name: hcm-invite-tracker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /meshdata/hcm-invite-tracker:/data
      - ./config/hcm-sources.yml:/app/config/hcm-sources.yml:ro
    ports:
      - "127.0.0.1:8091:8091"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
